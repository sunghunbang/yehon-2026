<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 예혼전</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e1f1c;--ink3:#6a9a90;--paper:#f2faf7;--paper2:#e4f5ef;--mint:#2bb891;--mint2:#58cca8;--mint3:#a8e6d4;--mint4:#d4f5ea;--line:rgba(14,31,28,0.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}
.bg1{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(43,184,145,.08) 0%,transparent 70%);top:-180px;right:-180px;pointer-events:none}
.bg2{position:fixed;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(88,204,168,.06) 0%,transparent 70%);bottom:-80px;left:-80px;pointer-events:none}
.page{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 28px 100px}
header{margin-bottom:52px}
.school-tag{display:inline-flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.16em;font-weight:500;color:var(--mint);border:0.5px solid var(--mint3);padding:4px 12px;border-radius:2px;margin-bottom:24px;background:var(--mint4)}
.school-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--mint);display:block}
h1{font-family:'Noto Serif KR',serif;font-size:clamp(36px,8vw,58px);font-weight:300;line-height:1.12;letter-spacing:-.015em;margin-bottom:16px}
h1 em{font-style:normal;color:var(--mint)}
.subtitle{font-size:13px;color:var(--ink3);letter-spacing:.05em;display:flex;align-items:center;gap:12px}
.subtitle::before{content:'';width:24px;height:1px;background:linear-gradient(to right,var(--mint),var(--mint3))}
.dday-banner{background:var(--ink);border-radius:8px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:44px;flex-wrap:wrap;gap:10px;border:1px solid rgba(43,184,145,.18)}
.dday-banner .label{font-size:9px;letter-spacing:.2em;color:var(--mint2);font-weight:500;margin-bottom:4px}
.dday-banner .num{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:300;color:#f2faf7}
.dday-banner .sub{font-size:11px;color:rgba(242,250,247,.4);margin-top:3px}
.dday-right{text-align:right}
.dday-right .od{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:300;color:#f2faf7}
.dday-right .os{font-size:10px;color:rgba(242,250,247,.4);margin-top:3px;letter-spacing:.06em}
.timeline{display:flex;flex-direction:column}
.month-label{font-size:9px;letter-spacing:.22em;color:var(--mint);font-weight:500;padding:0 0 12px 60px;margin-top:4px}
.item{display:grid;grid-template-columns:50px 1px 1fr;gap:0 20px;align-items:stretch;opacity:0;transform:translateY(12px);animation:fadeUp .5s cubic-bezier(.25,.8,.25,1) forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.date-col{display:flex;flex-direction:column;align-items:flex-end;padding-top:18px}
.date-m{font-size:9px;color:var(--ink3);letter-spacing:.07em}
.date-d{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:300;line-height:1;margin-top:2px}
.date-w{font-size:9px;color:var(--mint);margin-top:2px;font-weight:500}
.line-col{display:flex;flex-direction:column;align-items:center}
.dot-wrap{padding-top:21px;display:flex;flex-direction:column;align-items:center;flex:1}
.dot{width:10px;height:10px;border-radius:50%;background:var(--paper2);border:1.5px solid var(--mint3);flex-shrink:0}
.dot.hl{background:var(--mint);border-color:var(--mint);box-shadow:0 0 0 4px rgba(43,184,145,.15)}
.connector{width:1px;background:var(--line);flex:1;min-height:14px;margin-top:5px}
.item:last-child .connector{display:none}
.card{background:#fff;border:0.5px solid var(--line);border-radius:8px;padding:16px 18px;margin:8px 0 12px;transition:border-color .2s,transform .15s}
.card:hover{border-color:var(--mint3);transform:translateX(2px)}
.card.ft{border:1.5px solid var(--mint);background:linear-gradient(135deg,#f2faf7,#e8f8f2)}
.badge{display:inline-block;font-size:9px;letter-spacing:.1em;font-weight:500;padding:2px 8px;border-radius:3px;margin-bottom:8px}
.card-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:400;color:var(--ink);margin-bottom:7px}
.card-detail{font-size:12px;color:var(--ink3);line-height:1.9}
.card-detail li{list-style:none;display:flex;align-items:baseline;gap:7px}
.card-detail li::before{content:'—';color:var(--mint3);font-size:9px;flex-shrink:0}
.card-detail li.m{color:rgba(106,154,144,.45)}
.divider{margin:56px 0;height:1px;background:linear-gradient(to right,transparent,var(--mint3),transparent)}
footer{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px}
.footer-logo{font-family:'Noto Serif KR',serif;font-size:12px;color:var(--ink3);font-weight:300;line-height:1.8}
.footer-year{font-size:10px;color:var(--mint3);letter-spacing:.12em;font-weight:500}
</style>
</head>
<body>
<div class="bg1"></div><div class="bg2"></div>
<div class="page">
  <header>
    <div class="school-tag">충남예술고등학교 미술과</div>
    <h1>예<em>혼</em>전<br>2026</h1>
    <div class="subtitle">2학년 예술제 일정 안내</div>
  </header>
  <div class="dday-banner">
    <div>
      <div class="label">OPENING COUNTDOWN</div>
      <div class="num" id="dday-num">—</div>
      <div class="sub">예혼전 오픈식까지</div>
    </div>
    <div class="dday-right">
      <div class="od">7월 14일 화요일</div>
      <div class="os">2026 OPENING CEREMONY</div>
    </div>
  </div>
  <div class="timeline" id="tl"></div>
  <div class="divider"></div>
  <footer>
    <div class="footer-logo">충남예술고등학교<br>미술과 예혼전</div>
    <div class="footer-year">2026</div>
  </footer>
</div>
<script>
const E=[
  {mo:'MAY',dt:'말',wk:'',badge:'마감',bb:'#d4f5ea',bt:'#0f6e56',title:'개인 작품 완성 마감',detail:['2학년 개인 작품 최종 완성 제출'],hl:false},
  {mo:'JUN',dt:'04',wk:'목',badge:'촬영',bb:'#e4f5ef',bt:'#2bb891',title:'전체 작품 촬영',detail:['예혼 — 2학년','드로잉 — 1학년','→ 전시도록 의뢰'],muted:[2],hl:false},
  {mo:'JUL',dt:'13',wk:'월',badge:'설치',bb:'#d4f5ea',bt:'#0f6e56',title:'전시 DP',detail:['학교 중앙 로비'],hl:false},
  {mo:'JUL',dt:'14',wk:'화',badge:'OPEN',bb:'#0e1f1c',bt:'#58cca8',title:'예혼전 오픈식',detail:['전시 공식 오픈 행사'],hl:true},
  {mo:'JUL',dt:'15',wk:'수',badge:'워크숍',bb:'#e4f5ef',bt:'#2bb891',title:'작품 발표',detail:['워크숍 — 학생 작품 발표'],hl:false},
];
const KO={MAY:'5월',JUN:'6월',JUL:'7월'};
const tl=document.getElementById('tl');let last='';
E.forEach((ev,i)=>{
  if(ev.mo!==last){const m=document.createElement('div');m.className='month-label';m.textContent=KO[ev.mo];tl.appendChild(m);last=ev.mo;}
  const ms=new Set(ev.muted||[]);
  const item=document.createElement('div');item.className='item';item.style.animationDelay=(i*.09+.06)+'s';
  item.innerHTML=`<div class="date-col"><div class="date-m">${ev.mo}</div><div class="date-d">${ev.dt}</div>${ev.wk?`<div class="date-w">${ev.wk}</div>`:''}</div><div class="line-col"><div class="dot-wrap"><div class="dot${ev.hl?' hl':''}"></div><div class="connector"></div></div></div><div class="card${ev.hl?' ft':''}"><span class="badge" style="background:${ev.bb};color:${ev.bt}">${ev.badge}</span><div class="card-title">${ev.title}</div><ul class="card-detail">${ev.detail.map((d,di)=>`<li class="${ms.has(di)?'m':''}">${d}</li>`).join('')}</ul></div>`;
  tl.appendChild(item);
});
const today=new Date();today.setHours(0,0,0,0);
const open=new Date(2026,6,14);
const diff=Math.ceil((open-today)/86400000);
const el=document.getElementById('dday-num');
if(diff>0)el.textContent='D — '+diff;
else if(diff===0)el.textContent='D — DAY';
else el.textContent='CLOSED';
</script>
</body>
</html>
